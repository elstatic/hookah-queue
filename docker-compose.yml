services:
  app:
    container_name: hookah_queue
    build: .
    ports:
      - "3001:3000"
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/hookah_queue.db
    restart: unless-stopped

volumes:
  app-data:
